

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galeri Kenangan</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Georgia', serif;
    }

    body {
      background: #2b2118;
      text-align: center;
      padding: 40px 20px;
      color: #c4a072;
    }

    h2 {
      margin-bottom: 25px;
      color: #d2b48c;
      font-size: 2rem;
    }

    .photo-wall {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 30px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .mini-polaroid {
      width: 180px;
      background: #f5e6d3;
      padding: 12px 12px 35px;
      border-radius: 8px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      position: relative;
      transform: rotate(-6deg);
    }

    .mini-polaroid.right {
      transform: rotate(6deg);
    }

    .mini-polaroid img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 4px;
    }

    .pin {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #8b5e3c;
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    .polaroid {
      width: 90%;
      max-width: 380px;
      background: #f5e6d3;
      padding: 15px 15px 50px;
      margin: auto;
      border-radius: 8px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      transform: rotate(-2deg);
    }

    .polaroid img {
      width: 100%;
      height: 420px;
      object-fit: cover;
      border-radius: 4px;
    }

    .caption {
      margin-top: 18px;
      font-style: italic;
    }
  </style>
</head>
<body><audio autoplay loop>
    <source src="Sal Priadi - Kita usahakan rumah itu (Official Lyric Video).mp3" type="audio/mpeg">
  </audio>

  <h2>our little memories 📸</h2>

  <div class="photo-wall">
    <div class="mini-polaroid left">
      <div class="pin"></div>
      <img src="kita (9).jpg" alt="foto samping kiri" />
    </div>

    <div class="polaroid">
    <img id="slide" src="kita (6).jpg" alt="foto kenangan" />
    <div class="caption">✨every picture tells our story ✨</div>
  </div>

    <div class="mini-polaroid right">
      <div class="pin"></div>
      <img src="kita (2).jpg" alt="foto samping kanan" />
    </div>
  </div>

  <script>
    const images = [
    'kita.jpg',
    'kita (1).jpg',
    'kita (2).jpg',
    'kita (3).jpg',
    'kita (4).jpg',
    'kita (5).jpg',
    'kita (6).jpg',
    'kita (7).jpg',
    'kita (8).jpg',
    'kita (9).jpg',
    'kita (10).jpg',
    'kita (11).jpg',
  ];

    let index = 0;
    const slide = document.getElementById('slide');

    setInterval(() => {
      index = (index + 1) % images.length;
      slide.src = images[index];
    }, 2500);
  </script>
</body>
</html>
